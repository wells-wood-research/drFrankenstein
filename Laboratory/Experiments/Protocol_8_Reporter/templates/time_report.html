<style>
    .time-tabs {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .time-tab-button {
        background-color: #1e1e1e;
        color: #e0e0e0;
        border: 1px solid #00FF00;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
    }

    .time-tab-button.active {
        background-color: #00FF00;
        color: #000000;
    }

    .time-tab-content {
        display: none;
        margin-top: 15px;
    }

    .time-tab-content.active {
        display: block;
    }

    .time-plots {
        display: flex;
        flex-wrap: wrap;
        gap: 20px; /* Space between plots */
        justify-content: space-around; /* Distribute plots nicely */
        margin-top: 15px;
    }

    .time-plots .plot-container {
        text-align: center;
        flex: 1 1 1800px; /* Adjusted basis for potentially more plots or better wrapping */
        max-width: 1800px; /* Max width for each plot container */
    }

    /* Added/Modified styles for the image */
    .time-plots .plot-container img {
        width: 100%;      /* Make image fill container width */
        height: auto;       /* Maintain aspect ratio */
        max-width: 100%;  /* Ensure it doesn't overflow its container */
        display: block;     /* Removes extra space below if it's an inline element */
                            /* and allows margin auto for horizontal centering if width is less than 100% */
    }
    /* End of added/modified styles */

    .time-plots .plot-container p {
        color: #e0e0e0;
    }
    .time-plots .plot-container p strong {
        color: #ffffff;
    }
</style>

<h2> Time Report Summary</h2>
<div class="time-tabs">
    <button class="time-tab-button active" onclick="openTimeTab(event, 'timeTotal')">Total Time</button>
    <button class="time-tab-button" onclick="openTimeTab(event, 'timeCpu')">CPU Time</button>
</div>

<div id="timeTotal" class="time-tab-content active">
    {% if timeGanttPng %}
        <div class="time-plots">
            <div class="plot-container">
                <img src="{{ timeGanttPng }}" alt="Total Time Gantt">
            </div>
        </div>
    {% else %}
        <p>No total time data available.</p>
    {% endif %}
</div>

<div id="timeCpu" class="time-tab-content">
    {% if cpuTimeGanttPng %}
        <div class="time-plots">
            <div class="plot-container">
                <img src="{{ cpuTimeGanttPng }}" alt="CPU Time Gantt">
            </div>
        </div>
    {% else %}
        <p>No CPU time data available.</p>
    {% endif %}
</div>

<script>
    function openTimeTab(evt, tabName) {
        var tabcontent = document.getElementsByClassName("time-tab-content");
        for (var i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }
        var tabbuttons = document.getElementsByClassName("time-tab-button");
        for (var i = 0; i < tabbuttons.length; i++) {
            tabbuttons[i].classList.remove("active");
        }
        const activeTab = document.getElementById(tabName);
        if (activeTab) {
            activeTab.classList.add("active");
        }
        if (evt && evt.currentTarget) {
            evt.currentTarget.classList.add("active");
        }
    }
</script>
