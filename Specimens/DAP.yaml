  maeTolTotal: null
  maeTolTorsion: null
miscInfo:
  ## the maximum number of cores that will be used
  availableCpus: 30
  ## How many file do you want to delete? Accepts integers 0, 1, 2, 3
  cleanUpLevel: 1
  ## random seed used for all stochastic selections
  seed: 1818
  assemblyProtocol: ANTECHAMBER ## accepts ANTECHAMBER, CGENFF, or AGNOSTIC
  conformerSelectionMethods: DIVERSE
