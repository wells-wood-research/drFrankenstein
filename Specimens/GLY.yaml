moleculeInfo:
  charge: 0
  multiplicity: 1
  moleculeName: GLY

  chargeGroups:
    cTerminus: 
      atoms: [C, O]
      charge: 0
    nTerminus: 
      atoms: [CA, N]
      charge: 0
  backboneAliases:
      CA: [CA]
      HA: [HA]
      C: [C]
      N: [N]
      O: [O]
      H: [NH1]      ## NONSTANDARD 
        
  
