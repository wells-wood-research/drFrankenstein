#  |_|                                                                                       |___/                         #
#        How do you want to run parameter fitting?                                                                         #   
############################################################################################################################
  waterDensity: null
parameterFittingInfo:
  ## fitting protocol for QM torsion curves
  # fittingProtocol: AMBER
  ## what forcefield parameters do you want to create? Accepts ["CHARMM", "AMBER"]
  forceField: AMBER
  ## maximum cosine functions to be used to fit each torsion parameter (set > 1 for multi-term fits)
  maxCosineFunctions: 4
  ## global joint mode runs a single global round
  maxShuffles: 12
  minShuffles: 3
  ## L2 dampening factor DEFAULT 0.1
  l2DampingFactor: 0.1
  sagvolSmoothing:
    windowLength: 12
    polyorder: 4
    mode: interp
  converganceTolerance: 1.0

